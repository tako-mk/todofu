<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>とどーふ！</title>

    <!-- 英語・数字用の丸ゴシック（元のフォントから英数字だけを抽出） -->
    <link
        href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&text=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789%20-.&display=swap"
        rel="stylesheet">
    <!-- 日本語用のポップ体フォント -->
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/title.css">
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/gacha.css">
    <link rel="stylesheet" href="css/animation.css">
</head>

<body>
    <div id="viewport">
        <div id="game-root">
            <div id="game-screen">

                <div id="title-screen">
                    <p class="tap">TAP TO START</p>
                    <p class="credit">Produced by tako-mk</p>
                </div>

                <div id="loading-screen">
                    <div class="loader">
                        <div class="text">
                            <span>L</span>
                            <span>O</span>
                            <span>A</span>
                            <span>D</span>
                            <span>I</span>
                            <span>N</span>
                            <span>G</span>
                        </div>
                        <div class="underline"></div>
                    </div>
                    <div class="tips-box">
                        <div class="tips-title">TIPS</div>
                        <div class="tips-text"></div>
                    </div>
                </div>

                <div id="home-screen">
                    <div class="top-bar">
                        <div id="home-money-display" class="money">💰 1200</div>
                        <div id="home-diamond-display" class="diamond">💎 35</div>
                    </div>

                    <div class="main-area">
                        <img class="player-character" alt="player">
                    </div>

                    <div class="bottom-bar">
                        <div class="event-area">
                            <div class="event-title">イベント</div>
                            <div class="event-text">限定ガチャ開催中！</div>
                        </div>

                        <div class="menu-bar">
                            <button id="btn-gacha" class="menu-item">ガチャ</button>
                            <button class="menu-item">とどーふ</button>
                            <button class="menu-item">ミッション</button>
                            <button class="menu-item">合戦</button>
                        </div>
                    </div>
                </div>

                <div id="gacha-screen">
                    <div class="gacha-header">
                        <button id="btn-gacha-back" class="back-button">◀ もどる</button>
                        <div class="gacha-diamond-display">💎 35</div>
                    </div>
                    <div class="gacha-content-wrapper">
                        <!-- 左側のパネル（リスト＋操作ボタン） -->
                        <div class="gacha-left-panel">
                            <!-- 左側のリスト -->
                            <div class="gacha-list-area">
                                <button class="gacha-list-item active" data-gacha="pickup">ピックアップガチャ</button>
                                <button class="gacha-list-item" data-gacha="event">イベントガチャ</button>
                                <button class="gacha-list-item" data-gacha="normal">ノーマルガチャ</button>
                            </div>
                        </div><!-- end of gacha-left-panel -->

                        <!-- 右側のパネル（画像 ＋ 操作ボタン） -->
                        <div class="gacha-right-panel">
                            <!-- 右側のプレビュー（仮色または画像） -->
                            <div class="gacha-preview-area">
                                <img id="gacha-preview-img" src="" alt="ガチャ画像">
                                <div id="gacha-placeholder-text" class="gacha-placeholder-text">ピックアップガチャ（未作成）</div>
                            </div>

                            <!-- 右側下部のガチャ操作エリア -->
                            <div class="gacha-action-area horizontal">
                                <button class="gacha-info-btn">提供割合</button>
                                <div class="gacha-draw-buttons">
                                    <button class="gacha-draw-btn draw-single" data-count="1">
                                        <span class="draw-title">1回引く</span>
                                        <span class="draw-cost">💎 100</span>
                                    </button>
                                    <button class="gacha-draw-btn draw-multi" data-count="10">
                                        <span class="draw-title">10回引く</span>
                                        <span class="draw-cost">💎 1000</span>
                                    </button>
                                </div>
                            </div>
                        </div><!-- end of gacha-right-panel -->

                        <div id="gacha-result-modal" class="modal">
                            <div class="result-modal-content">
                                <h2 class="result-title">ガチャ結果</h2>
                                <div id="gacha-result-grid" class="result-grid">
                                    <!-- 10個の正方形タイルがここに並ぶ -->
                                </div>
                                <div class="result-footer">
                                    <button id="gacha-result-close" class="btn-close">とじる</button>
                                    <button id="gacha-draw-again" class="btn-draw-again">もう一度引く</button>
                                </div>
                            </div>
                        </div>


                        <div id="gacha-confirm-modal" class="modal">
                            <div class="modal-content">

                                <h2 class="modal-title">確認</h2>

                                <p class="modal-text">
                                    ダイヤを <span id="cost-before">100</span> 個消費して<br>
                                    ガチャを引きますか？
                                </p>
                                <p id="gacha-warning" class="gacha-warning"></p>
                                <p class="modal-diamond">
                                    <span id="diamond-before">500</span>個 →
                                    <span id="diamond-after">400</span>個
                                </p>

                                <div class="modal-buttons">
                                    <button id="cancel-gacha" class="btn-cancel">やめる</button>
                                    <button id="confirm-gacha" class="btn-confirm">引く</button>
                                </div>

                            </div>
                        </div>

                        <div id="gacha-animation-modal" class="gacha-animation-modal">
                            <!-- 背景：水色 -->
                            <div class="gacha-anim-bg"></div>

                            <!-- キャラクター表示エリア：左右分割 -->
                            <div id="gacha-reveal-container" class="gacha-reveal-container">
                                <div class="reveal-left">
                                    <img id="reveal-char-img" src="" alt="character">
                                </div>
                                <div class="reveal-right">
                                    <div id="reveal-new-badge" class="new-badge" style="display: none;">NEW!</div>
                                    <div id="reveal-char-rarity" class="reveal-rarity"></div>
                                    <div id="reveal-char-subtitle" class="reveal-subtitle"></div>
                                    <div id="reveal-char-prefecture" class="reveal-prefecture"></div>
                                </div>
                            </div>

                            <!-- ホワイトアウト幕（左右に開く） -->
                            <div id="gacha-curtain-left" class="gacha-curtain-left"></div>
                            <div id="gacha-curtain-right" class="gacha-curtain-right"></div>

                            <!-- タッププロンプト -->
                            <div id="gacha-tap-prompt" class="gacha-tap-prompt">tap!</div>

                        </div>

                        <!-- 提供割合モーダル -->
                        <div id="gacha-rate-modal" class="modal">
                            <div class="rate-modal-content">
                                <h2 class="rate-title">提供割合</h2>
                                <div class="rate-scroll-area">
                                    <table class="rate-table">
                                        <!-- レアリティ別の確率をJSで挿入 -->
                                    </table>
                                    <div class="character-rate-list">
                                        <h3>出現キャラクター一覧</h3>
                                        <div id="char-rate-table" class="char-rate-table">
                                            <!-- 個別キャラの確率をJSで挿入 -->
                                        </div>
                                    </div>
                                </div>
                                <div class="rate-footer">
                                    <button class="rate-close-btn">とじる</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>


    <canvas id="game"></canvas>

    <script type="module" src="js/main.js"></script>
</body>

</html>
